{% load static %}

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Skill-log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'posts/style.css' %}">
</head>
<body>
    <header class="site-header mb-4">
        <nav class="navbar navbar-expand-md navbar-dark w-100">
            <div class="container-fluid px-0">

                <h1 class="mb-0">
                    <a href="{% url 'post_list' %}" class="text-decoration-none">
                        Skill-log
                    </a>
                </h1>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar"
                    aria-controls="mainNavbar"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNavbar">
                    <div class="navbar-nav ms-auto">
                        <a class="nav-link" href="{% url 'post_list' %}">All</a>
                        <a class="nav-link" href="{% url 'post_category' 'english' %}">English</a>
                        <a class="nav-link" href="{% url 'post_category' 'python' %}">Python</a>
                        <a class="nav-link" href="{% url 'post_category' 'django' %}">Django</a>
                        <a class="nav-link" href="{% url 'post_category' 'automation' %}">Automation</a>
                        <a class="nav-link" href="{% url 'post_category' 'fx' %}">FX</a>

                        {% if user.is_staff %}
                            <a class="nav-link text-nowrap" href="{% url 'post_create' %}">New Post</a>
                        {% endif %}

                        {% if user.is_authenticated %}
                            <a class="nav-link" href="{% url 'profile_detail' user.username %}">Profile</a>
                            <form method="post" action="{% url 'logout' %}" class="ms-md-2">
                            {% csrf_token %}
                                <button type="submit" class="btn btn-outline-light btn-sm">
                                Logout
                                </button>
                            </form>
                        {% else %}
                            <a class="nav-link" href="{% url 'login' %}">Login</a>
                            <a class="nav-link text-nowrap" href="{% url 'signup' %}">Sign Up</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <div class="container mt-4">
        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
