{% load static %}

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Skill-log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'posts/style.css' %}">
</head>
<body>
    <div class="container mt-4">
        <header class="mb-4">

            <div class="d-flex justify-content-between align-items-center">

                <h1 class="mb-0">
                    <a href="{% url 'post_list' %}"
                        class="text-decoration-none text-dark">
                        Skill-log
                    </a>
                </h1>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>

            </div>

            <nav class="navbar navbar-expand-md navbar-light">
                <div class="container-fluid px-0">

                    <div class="collapse navbar-collapse" id="mainNavbar">

                        <div class="navbar-nav w-100">

                            <a class="nav-link" href="{% url 'post_list' %}">All</a>
                            <a class="nav-link" href="{% url 'post_category' 'english' %}">English</a>
                            <a class="nav-link" href="{% url 'post_category' 'python' %}">Python</a>
                            <a class="nav-link" href="{% url 'post_category' 'django' %}">Django</a>
                            <a class="nav-link" href="{% url 'post_category' 'automation' %}">Automation</a>
                            <a class="nav-link" href="{% url 'post_category' 'fx' %}">FX</a>

                            <div class="ms-auto d-flex align-items-center gap-3">
                                {% if user.is_staff %}
                                    <a class="nav-link text-nowrap" href="{% url 'post_create' %}">New Post</a>
                                {% endif %}
                                {% if user.is_authenticated %}
                                    <a class="nav-link" href="{% url 'profile_detail' user.username %}">Profile</a>
                                    <form method="post" action="{% url 'logout' %}">
                                        {% csrf_token %}
                                        <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
                                    </form>

                                {% else %}
                                    <a class="nav-link" href="{% url 'login' %}">Login</a>
                                    <a class="nav-link text-nowrap" href="{% url 'signup' %}">Sign Up</a>
                                {% endif %}
                            </div>
                        </div>

                    </div>

                </div>
            </nav>

            <hr>
        </header>

        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
