{% load static %}

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Skill Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'posts/style.css' %}">
</head>
<body>
    <div class="container mt-4">
        <header class="mb-4">
            <h1>
                <a href="{% url 'post_list' %}" class="text-decoration-none text-dark">
                    Skill Log
                </a>
            </h1>

            <nav class="nav gap-3">
                <a href="{% url 'post_list' %}">All</a>
                <a href="{% url 'post_category' 'english' %}">English</a>
                <a href="{% url 'post_category' 'python' %}">Python</a>
                <a href="{% url 'post_category' 'django' %}">Django</a>
                <a href="{% url 'post_category' 'automation' %}">Automation</a>
                <a href="{% url 'post_category' 'fx' %}">FX</a>
                <a href="{% url 'post_create' %}">New Post</a>

                {% if user.is_authenticated %}
                    <span>Logged in as {{ user.username }}</span>

                    <form method="post" action="{% url 'logout' %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-link p-0">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'signup' %}">Sign Up</a>
                {% endif %}
            </nav>

            <hr>
        </header>

        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>
</body>
</html>
