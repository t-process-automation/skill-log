{% extends 'posts/base.html' %}

{% block content %}
<h2>{{ profile_user.username }}'s Profile</h2>

{% if profile.avatar %}
    <img src="{{ profile.avatar.url }}" class="img-fluid mb-3" style="max-width: 200px;">
{% endif %}

<p>{{ profile.bio }}</p>

{% if profile.github_url %}
    <p><a href="{{ profile.github_url }}">GitHub</a></p>
{% endif %}

{% if profile.website_url %}
    <p><a href="{{ profile.website_url }}">Website</a></p>
{% endif %}
{% endblock %}
